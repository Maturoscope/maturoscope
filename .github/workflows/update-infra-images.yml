name: Update Infrastructure Images

on:
  repository_dispatch:
    types: [update-infra-images]
  workflow_dispatch:
    inputs:
      api_tag:
        description: 'API image tag to update'
        required: false
        default: ''
      dashboard_tag:
        description: 'Dashboard image tag to update'
        required: false
        default: ''
      web_tag:
        description: 'Web image tag to update'
        required: false
        default: ''

jobs:
  update-infra-api:
    if: github.event.inputs.api_tag != '' || (github.event_name == 'repository_dispatch' && github.event.client_payload.api_tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: Maturoscope/maturoscope-infra
          token: ${{ secrets.WORKFLOW_DISPATCH_TOKEN }}
          path: infra

      - name: Install yq (CLI)
        run: |
          sudo curl -L "https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64" -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Update kustomize image tag (API)
        env:
          TAG: ${{ github.event.inputs.api_tag != '' && github.event.inputs.api_tag || github.event.client_payload.api_tag }}
          FILE: infra/clusters/de1-staging/apps/api/overlays/staging/kustomization.yaml
          IMAGE_NAME: bv630390.c1.de1.container-registry.ovh.net/maturoscope-api/api
        run: |
          echo "Checking if file exists: $FILE"
          if [ ! -f "$FILE" ]; then
            echo "File does not exist, creating directory structure..."
            mkdir -p "$(dirname "$FILE")"
            echo "apiVersion: kustomize.config.k8s.io/v1beta1" > "$FILE"
            echo "kind: Kustomization" >> "$FILE"
            echo "namespace: maturoscope" >> "$FILE"
            echo "resources:" >> "$FILE"
            echo "  - ../../base" >> "$FILE"
            echo "images:" >> "$FILE"
            echo "  - name: $IMAGE_NAME" >> "$FILE"
            echo "    newTag: $TAG" >> "$FILE"
          fi
          
          # Ensure images section exists
          if ! yq '.images' "$FILE" >/dev/null 2>&1; then
            echo "Images section does not exist, creating it..."
            yq -i '.images = []' "$FILE"
          fi
          
          echo "Updating image tag for $IMAGE_NAME to $TAG"
          
          # Check if image already exists in the file
          if yq ".images[] | select(.name == \"$IMAGE_NAME\")" "$FILE" >/dev/null 2>&1; then
            echo "Image exists, updating tag..."
            yq -i ".images[] | select(.name == \"$IMAGE_NAME\") | .newTag = \"$TAG\"" "$FILE"
          else
            echo "Image does not exist, adding new image..."
            yq -i ".images += [{\"name\": \"$IMAGE_NAME\", \"newTag\": \"$TAG\"}]" "$FILE"
          fi
          
          echo "Updated file content:"
          cat "$FILE"

      - name: Commit & Push API
        env:
          TAG: ${{ github.event.inputs.api_tag != '' && github.event.inputs.api_tag || github.event.client_payload.api_tag }}
        run: |
          cd infra
          git config user.name "ci-bot"
          git config user.email "ci@maturoscope.io"
          git add clusters/de1-staging/apps/api/overlays/staging/kustomization.yaml
          git commit -m "api(staging): bump image to ${TAG}" || echo "No changes to commit"
          git push

  update-infra-dashboard:
    if: github.event.inputs.dashboard_tag != '' || (github.event_name == 'repository_dispatch' && github.event.client_payload.dashboard_tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

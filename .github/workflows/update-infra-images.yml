name: Update Infrastructure Images

on:
  repository_dispatch:
    types: [update-infra-images]
  workflow_dispatch:
    inputs:
      api_tag:
        description: 'API image tag to update'
        required: false
        default: ''
      dashboard_tag:
        description: 'Dashboard image tag to update'
        required: false
        default: ''
      web_tag:
        description: 'Web image tag to update'
        required: false
        default: ''
      environment:
        description: 'Environment (production or staging)'
        required: false
        default: 'staging'

jobs:
  update-infra-api:
    if: github.event.inputs.api_tag != '' || (github.event_name == 'repository_dispatch' && github.event.client_payload.api_tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: Maturoscope/maturoscope-infra
          token: ${{ secrets.WORKFLOW_DISPATCH_TOKEN }}
          path: infra

      - name: Install yq (CLI)
        run: |
          sudo curl -L "https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64" -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Update kustomize image tag (API)
        env:
          TAG: ${{ github.event.inputs.api_tag != '' && github.event.inputs.api_tag || github.event.client_payload.api_tag }}
          ENVIRONMENT: ${{ github.event.inputs.environment != '' && github.event.inputs.environment || github.event.client_payload.environment || 'staging' }}
        run: |
          set -euo pipefail
          
          echo "🔍 Environment: $ENVIRONMENT"
          echo "🏷️ Tag: $TAG"
          
          # Determine paths and registry based on environment
          if [[ "$ENVIRONMENT" == "production" ]]; then
            FILE="infra/clusters/eu-west-par-prod/apps/api/overlays/production/kustomization.yaml"
            IMAGE_NAME="c8781u0i.eu-west-par.container-registry.ovh.net/maturoscope-api/api"
            ENV_LABEL="production"
          else
            FILE="infra/clusters/de1-staging/apps/api/overlays/staging/kustomization.yaml"
            IMAGE_NAME="bv630390.c1.de1.container-registry.ovh.net/maturoscope-api/api"
            ENV_LABEL="staging"
          fi
          
          APP_NAME="api"
          
          echo "📁 File: $FILE"
          echo "🖼️ Image: $IMAGE_NAME"
          
          # 1) Si no existe, crear un kustomization.yaml válido y mínimo
          if [ ! -f "$FILE" ]; then
            mkdir -p "$(dirname "$FILE")"
            echo "apiVersion: kustomize.config.k8s.io/v1beta1" > "$FILE"
            echo "kind: Kustomization" >> "$FILE"
            echo "namespace: maturoscope" >> "$FILE"
            echo "resources:" >> "$FILE"
            echo "  - ../../base" >> "$FILE"
            echo "images: []" >> "$FILE"
          fi
          
          # 2) Asegurar que images exista
          if ! yq -e '.images' "$FILE" >/dev/null 2>&1; then
            yq -i '.images = []' "$FILE"
          fi
          
          # 3) Actualizar si ya existe
          yq -i '
            (.images[] | select(.name == strenv(IMAGE_NAME)) | .newTag) = strenv(TAG)
          ' "$FILE"
          
          # 4) Agregar si no existe
          if ! yq -e ".images[] | select(.name == \"$IMAGE_NAME\")" "$FILE" >/dev/null; then
            yq -i ".images += [{\"name\": \"$IMAGE_NAME\", \"newTag\": \"$TAG\"}]" "$FILE"
          fi
          
          echo "Resultado final de $FILE:"
          cat "$FILE"
          
          # 5) Git operations with proper conflict handling (API)
          cd infra
          git config user.name "ci-bot"
          git config user.email "ci@maturoscope.io"
          git config pull.rebase true
          
          # Add changes first, then pull
          git add "${FILE#infra/}"
          
          # Retry logic for git operations
          MAX_RETRIES=5
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "API - Attempt $((RETRY_COUNT + 1)) of $MAX_RETRIES"
            
            # Pull latest changes
            if git pull --rebase origin main; then
              echo "Successfully pulled and rebased"
            else
              echo "Rebase failed, stashing changes and retrying..."
              git stash
              git pull --rebase origin main
              git stash pop || echo "No stash to pop"
              git add "${FILE#infra/}"
            fi
            
            # Try to commit and push
            if git diff --staged --quiet; then
              echo "No changes to commit"
              break
            fi
            
            git commit -m "${APP_NAME}(${ENV_LABEL}): bump image to ${TAG}"
            
            if git push origin main; then
              echo "Successfully pushed changes"
              break
            else
              echo "Push failed, will retry..."
              git reset HEAD~1  # Undo commit to retry
              RETRY_COUNT=$((RETRY_COUNT + 1))
              sleep $((RETRY_COUNT * 2))  # Exponential backoff
            fi
          done
          
          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "Failed to push after $MAX_RETRIES attempts"
            exit 1
          fi

      


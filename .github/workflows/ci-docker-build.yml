name: CI - Smart Docker Build

on:
  push:
    branches:
      - staging
      - develop
      - main
  pull_request:
    branches:
      - staging
      - develop
      - main

permissions:
  contents: read
  actions: write

env:
  REGISTRY: bv630390.c1.de1.container-registry.ovh.net

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      api-changed: ${{ steps.filter.outputs.api == 'true' }}
      app-changed: ${{ steps.filter.outputs.app == 'true' }}
      dashboard-changed: ${{ steps.filter.outputs.dashboard == 'true' }}
      shared-changed: ${{ steps.filter.outputs.shared }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip on draft PRs
        if: github.event_name == 'pull_request' && github.event.pull_request.draft == true
        run: |
          echo "⏭️ Skipping CI for draft PR"
          exit 0

      - name: Check for changes
        id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'apps/api/package.json'
              - 'apps/api/Dockerfile'
            app:
              - 'apps/app/**'
              - 'apps/app/package.json'
              - 'apps/app/Dockerfile'
            dashboard:
              - 'apps/dashboard/**'
              - 'apps/dashboard/package.json'
              - 'apps/dashboard/Dockerfile'
            shared:
              - 'package.json'
              - 'yarn.lock'
              - 'turbo.json'
              - 'packages/**'

      - name: Debug changes
        run: |
          echo "🔍 Debugging detected changes:"
          echo "API changed: ${{ steps.filter.outputs.api }}"
          echo "App changed: ${{ steps.filter.outputs.app }}"
          echo "Dashboard changed: ${{ steps.filter.outputs.dashboard }}"
          echo "Shared changed: ${{ steps.filter.outputs.shared }}"
          echo ""
          echo "📊 Final build decisions:"
          echo "Will build API: ${{ steps.filter.outputs.api == 'true' }}"
          echo "Will build App: ${{ steps.filter.outputs.app == 'true' }}"
          echo "Will build Dashboard: ${{ steps.filter.outputs.dashboard == 'true' }}"
          echo ""
          echo "📁 Changed files:"
          git diff --name-only ${{ github.event.before }} ${{ github.sha }} || echo "No diff available"

  build-api:
    needs: check-changes
    if: needs.check-changes.outputs.api-changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.TAG }}
      environment: ${{ steps.vars.outputs.environment }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set tag and environment
        id: vars
        run: |
          SHORT_SHA=$(git rev-parse --short $GITHUB_SHA)
          TS=$(date -u +%Y%m%d-%H%M%S)
          
          # Determine environment and create appropriate tag
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENVIRONMENT="prod"
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            ENVIRONMENT="staging"
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi
          
          echo "TAG=${ENVIRONMENT}-${TS}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "🏷️ API Generated tag: ${ENVIRONMENT}-${TS}-${SHORT_SHA}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to OVH Harbor
        run: echo "${{ secrets.HARBOR_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.HARBOR_USERNAME }} --password-stdin

      - name: Build & Push API Image
        run: |
          docker build \
            --file apps/api/Dockerfile \
            --tag ${{ env.REGISTRY }}/maturoscope-api/api:${{ steps.vars.outputs.TAG }} \
            --build-arg API_PORT=8000 \
            .
          docker push ${{ env.REGISTRY }}/maturoscope-api/api:${{ steps.vars.outputs.TAG }}

      - name: Dispatch update-infra (API)
        if: success()
        run: |
          echo "Dispatching update-infra workflow for API with tag: ${{ steps.vars.outputs.TAG }}"
          echo "Repository: ${{ github.repository }}"
          
          # Use PAT for workflow dispatch
          echo "Dispatching update-infra workflow for API with tag: ${{ steps.vars.outputs.TAG }}"
          echo "Repository: ${{ github.repository }}"
          
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.WORKFLOW_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/update-infra-images.yml/dispatches \
            -d '{"ref":"staging","inputs":{"api_tag":"'"${{ steps.vars.outputs.TAG }}"'"}}'

  build-app:
    needs: check-changes
    if: needs.check-changes.outputs.app-changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.TAG }}
      environment: ${{ steps.vars.outputs.environment }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set tag and environment
        id: vars
        run: |
          SHORT_SHA=$(git rev-parse --short $GITHUB_SHA)
          TS=$(date -u +%Y%m%d-%H%M%S)
          
          # Determine environment and create appropriate tag
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENVIRONMENT="prod"
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            ENVIRONMENT="staging"
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi
          
          echo "TAG=${ENVIRONMENT}-${TS}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "🏷️ App Generated tag: ${ENVIRONMENT}-${TS}-${SHORT_SHA}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to OVH Harbor
        run: echo "${{ secrets.HARBOR_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.HARBOR_USERNAME }} --password-stdin

      - name: Build & Push App Image
        run: |
          docker build \
            --file apps/app/Dockerfile \
            --tag ${{ env.REGISTRY }}/maturoscope-app/app:${{ steps.vars.outputs.TAG }} \
            --build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY="${{ secrets.PROD_GOOGLE_MAPS_API_KEY || 'prod-key' }}" \
            --build-arg NEXT_PUBLIC_GATEWAY_URL="${{ secrets.PROD_GATEWAY_URL || 'https://api.yourapp.com' }}" \
            --build-arg NEXT_SERVER_ACTIONS_ENCRYPTION_KEY="${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}" \
            .
          docker push ${{ env.REGISTRY }}/maturoscope-app/app:${{ steps.vars.outputs.TAG }}

      - name: Dispatch update-infra (App)
        if: success()
        run: |
          echo "Dispatching update-infra workflow for App with tag: ${{ steps.vars.outputs.TAG }}"
          echo "Repository: ${{ github.repository }}"
          
          # Use PAT for workflow dispatch
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.WORKFLOW_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/update-infra-images.yml/dispatches \
            -d '{"ref":"staging","inputs":{"web_tag":"'"${{ steps.vars.outputs.TAG }}"'"}}'

  build-dashboard:
    needs: check-changes
    if: needs.check-changes.outputs.dashboard-changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.TAG }}
      environment: ${{ steps.vars.outputs.environment }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set tag and environment
        id: vars
        run: |
          SHORT_SHA=$(git rev-parse --short $GITHUB_SHA)
          TS=$(date -u +%Y%m%d-%H%M%S)
          
          # Determine environment and create appropriate tag
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENVIRONMENT="prod"
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            ENVIRONMENT="staging"
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi
          
          echo "TAG=${ENVIRONMENT}-${TS}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "🏷️ Generated tag: ${ENVIRONMENT}-${TS}-${SHORT_SHA}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to OVH Harbor
        run: echo "${{ secrets.HARBOR_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.HARBOR_USERNAME }} --password-stdin

      - name: Build & Push Dashboard Image
        run: |
          echo "🚀 Building Dashboard for ${{ steps.vars.outputs.environment }} environment..."
          
          # Set environment-specific variables directly without using GITHUB_OUTPUT
          echo "🔍 DEBUG: Detected environment: ${{ steps.vars.outputs.environment }}"
          echo "🔍 DEBUG: Current branch: ${{ github.ref }}"
          
          if [[ "${{ steps.vars.outputs.environment }}" == "production" ]]; then
            AUTH0_CLIENT_SECRET="${{ secrets.PROD_AUTH0_CLIENT_SECRET }}"
            AUTH0_SECRET="${{ secrets.PROD_AUTH0_SECRET }}"
            NEXT_PUBLIC_END_USER_URL="${{ secrets.PROD_END_USER_URL || secrets.PROD_NEXT_PUBLIC_END_USER_URL || '' }}"
            echo "🔧 Using PRODUCTION secrets"
            echo "🔍 DEBUG: PROD_AUTH0_CLIENT_SECRET exists: $([ -n '${{ secrets.PROD_AUTH0_CLIENT_SECRET }}' ] && echo 'YES' || echo 'NO')"
          else
            AUTH0_CLIENT_SECRET="${{ secrets.STAGING_AUTH0_CLIENT_SECRET }}"
            AUTH0_SECRET="${{ secrets.STAGING_AUTH0_SECRET }}"
            NEXT_PUBLIC_END_USER_URL="${{ secrets.STAGING_END_USER_URL || secrets.STAGING_NEXT_PUBLIC_END_USER_URL || '' }}"
            echo "🔧 Using STAGING secrets"
            echo "🔍 DEBUG: STAGING_AUTH0_CLIENT_SECRET exists: $([ -n '${{ secrets.STAGING_AUTH0_CLIENT_SECRET }}' ] && echo 'YES' || echo 'NO')"
          fi
          
          echo "🔍 DEBUG: Final AUTH0_CLIENT_SECRET length: ${#AUTH0_CLIENT_SECRET}"
          echo "🔍 DEBUG: NEXT_PUBLIC_END_USER_URL: ${NEXT_PUBLIC_END_USER_URL:0:50}..."
          
          docker build \
            --file apps/dashboard/Dockerfile \
            --tag ${{ env.REGISTRY }}/maturoscope-dashboard/dashboard:${{ steps.vars.outputs.TAG }} \
            --build-arg AUTH0_CLIENT_SECRET="$AUTH0_CLIENT_SECRET" \
            --build-arg AUTH0_SECRET="$AUTH0_SECRET" \
            --build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY="${{ secrets.PROD_GOOGLE_MAPS_API_KEY || 'prod-key' }}" \
            --build-arg NEXT_PUBLIC_GATEWAY_URL="${{ secrets.PROD_GATEWAY_URL || 'https://api.yourapp.com' }}" \
            --build-arg NEXT_PUBLIC_END_USER_URL="$NEXT_PUBLIC_END_USER_URL" \
            .
          docker push ${{ env.REGISTRY }}/maturoscope-dashboard/dashboard:${{ steps.vars.outputs.TAG }}

      - name: Dispatch update-infra (Dashboard)
        if: success()
        run: |
          echo "Dispatching update-infra workflow for Dashboard with tag: ${{ steps.vars.outputs.TAG }}"
          echo "Repository: ${{ github.repository }}"
          
          # Use PAT for workflow dispatch
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.WORKFLOW_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/update-infra-images.yml/dispatches \
            -d '{"ref":"staging","inputs":{"dashboard_tag":"'"${{ steps.vars.outputs.TAG }}"'"}}'

  summary:
    needs: [check-changes, build-api, build-app, build-dashboard]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Smart Build Summary
        run: |
          echo "🚀 Optimized CI Build Summary"
          echo "=============================="
          echo "📊 Change Detection:"
          echo "  API changed: ${{ needs.check-changes.outputs.api-changed }}"
          echo "  App changed: ${{ needs.check-changes.outputs.app-changed }}"
          echo "  Dashboard changed: ${{ needs.check-changes.outputs.dashboard-changed }}"
          echo "  Shared dependencies changed: ${{ needs.check-changes.outputs.shared-changed }}"
          echo ""
          echo "🎯 Build Strategy: Apps only build when their specific code changes"
          echo "   (Shared deps like yarn.lock no longer trigger all builds)"
          echo ""
          echo "🏗️ Build Results:"
          echo "  API: ${{ needs.build-api.result || 'skipped' }}"
          echo "  App: ${{ needs.build-app.result || 'skipped' }}"
          echo "  Dashboard: ${{ needs.build-dashboard.result || 'skipped' }}"
          echo ""
          echo "🏷️ Generated Tags:"
          echo "  API: ${{ needs.build-api.outputs.tag || 'N/A' }}"
          echo "  App: ${{ needs.build-app.outputs.tag || 'N/A' }}"
          echo "  Dashboard: ${{ needs.build-dashboard.outputs.tag || 'N/A' }}"
          echo ""
          echo "🌍 Target Environment:"
          echo "  Branch: ${{ github.ref }}"
          echo "  Environment: ${{ needs.build-dashboard.outputs.environment || needs.build-api.outputs.environment || needs.build-app.outputs.environment || 'N/A' }}"
          echo ""
          echo "✅ Optimized build completed - only changed apps were built!"

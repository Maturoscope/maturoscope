name: CI - Smart Docker Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      api-changed: ${{ steps.filter.outputs.api }}
      app-changed: ${{ steps.filter.outputs.app }}
      dashboard-changed: ${{ steps.filter.outputs.dashboard }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes
        id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/**'
              - 'package.json'
              - 'yarn.lock'
              - 'turbo.json'
            app:
              - 'apps/app/**'
              - 'packages/**'
              - 'package.json'
              - 'yarn.lock'
              - 'turbo.json'
            dashboard:
              - 'apps/dashboard/**'
              - 'packages/**'
              - 'package.json'
              - 'yarn.lock'
              - 'turbo.json'

  build-api:
    needs: check-changes
    if: needs.check-changes.outputs.api-changed == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set repository name
        run: echo "IMAGE_NAME=josecalvano1546/maturoscope" >> $GITHUB_ENV

      - name: Build API Image
        run: |
          docker build \
            --file apps/api/Dockerfile \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:${{ github.sha }} \
            --build-arg DATABASE_URL="${{ secrets.PROD_DATABASE_URL || 'postgresql://prod:prod@localhost:5432/prod' }}" \
            --build-arg JWT_SECRET="${{ secrets.PROD_JWT_SECRET || 'production-secret' }}" \
            --build-arg API_PORT=8000 \
            .

      - name: Push API Image (Production)
        if: github.ref == 'refs/heads/main'
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:${{ github.sha }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:latest

      - name: Success - API
        run: |
          echo "✅ API built successfully!"
          echo "📦 Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:${{ github.sha }}"

  build-app:
    needs: check-changes
    if: needs.check-changes.outputs.app-changed == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set repository name
        run: echo "IMAGE_NAME=josecalvano1546/maturoscope" >> $GITHUB_ENV

      - name: Build App Image
        run: |
          docker build \
            --file apps/app/Dockerfile \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/app:${{ github.sha }} \
            --build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY="${{ secrets.PROD_GOOGLE_MAPS_API_KEY || 'prod-key' }}" \
            --build-arg NEXT_PUBLIC_GATEWAY_URL="${{ secrets.PROD_GATEWAY_URL || 'https://api.yourapp.com' }}" \
            .

      - name: Push App Image (Production)
        if: github.ref == 'refs/heads/main'
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/app:${{ github.sha }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/app:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/app:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/app:latest

      - name: Success - App
        run: |
          echo "✅ App built successfully!"
          echo "📦 Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/app:${{ github.sha }}"

  build-dashboard:
    needs: check-changes
    if: needs.check-changes.outputs.dashboard-changed == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set repository name
        run: echo "IMAGE_NAME=josecalvano1546/maturoscope" >> $GITHUB_ENV

      - name: Build Dashboard Image
        run: |
          docker build \
            --file apps/dashboard/Dockerfile \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/dashboard:${{ github.sha }} \
            --build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY="${{ secrets.PROD_GOOGLE_MAPS_API_KEY || 'prod-key' }}" \
            --build-arg NEXT_PUBLIC_GATEWAY_URL="${{ secrets.PROD_GATEWAY_URL || 'https://api.yourapp.com' }}" \
            .

      - name: Push Dashboard Image (Production)
        if: github.ref == 'refs/heads/main'
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/dashboard:${{ github.sha }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/dashboard:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/dashboard:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/dashboard:latest

      - name: Success - Dashboard
        run: |
          echo "✅ Dashboard built successfully!!"
          echo "📦 Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/dashboard:${{ github.sha }}"

  summary:
    needs: [check-changes, build-api, build-app, build-dashboard]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Build Summary
        run: |
          echo "🚀 Smart Build Summary"
          echo "======================"
          echo "API changed: ${{ needs.check-changes.outputs.api-changed }}"
          echo "App changed: ${{ needs.check-changes.outputs.app-changed }}"
          echo "Dashboard changed: ${{ needs.check-changes.outputs.dashboard-changed }}"
          echo ""
          echo "Build Results:"
          echo "API: ${{ needs.build-api.result || 'skipped' }}"
          echo "App: ${{ needs.build-app.result || 'skipped' }}"
          echo "Dashboard: ${{ needs.build-dashboard.result || 'skipped' }}"
          echo ""
          echo "✅ Smart build completed!"

name: CI - Smart Docker Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: bv630390.c1.de1.container-registry.ovh.net

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      api-changed: ${{ steps.filter.outputs.api }}
      app-changed: ${{ steps.filter.outputs.app }}
      dashboard-changed: ${{ steps.filter.outputs.dashboard }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes
        id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/**'
              - 'package.json'
              - 'yarn.lock'
              - 'turbo.json'
            app:
              - 'apps/app/**'
              - 'packages/**'
              - 'package.json'
              - 'yarn.lock'
              - 'turbo.json'
            dashboard:
              - 'apps/dashboard/**'
              - 'packages/**'
              - 'package.json'
              - 'yarn.lock'
              - 'turbo.json'

  build-api:
    needs: check-changes
    if: needs.check-changes.outputs.api-changed == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to OVH Harbor
        run: echo "${{ secrets.HARBOR_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.HARBOR_USERNAME }} --password-stdin

      - name: Build & Push API Image
        run: |
          docker build \
            --file apps/api/Dockerfile \
            --tag ${{ env.REGISTRY }}/maturoscope-api/api:${{ github.sha }} \
            --tag ${{ env.REGISTRY }}/maturoscope-api/api:latest \
            --build-arg DATABASE_URL="${{ secrets.PROD_DATABASE_URL || 'postgresql://prod:prod@localhost:5432/prod' }}" \
            --build-arg JWT_SECRET="${{ secrets.PROD_JWT_SECRET || 'production-secret' }}" \
            --build-arg API_PORT=8000 \
            .
          docker push ${{ env.REGISTRY }}/maturoscope-api/api:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/maturoscope-api/api:latest

  build-app:
    needs: check-changes
    if: needs.check-changes.outputs.app-changed == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to OVH Harbor
        run: echo "${{ secrets.HARBOR_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.HARBOR_USERNAME }} --password-stdin

      - name: Build & Push App Image
        run: |
          docker build \
            --file apps/app/Dockerfile \
            --tag ${{ env.REGISTRY }}/maturoscope-app/app:${{ github.sha }} \
            --tag ${{ env.REGISTRY }}/maturoscope-app/app:latest \
            --build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY="${{ secrets.PROD_GOOGLE_MAPS_API_KEY || 'prod-key' }}" \
            --build-arg NEXT_PUBLIC_GATEWAY_URL="${{ secrets.PROD_GATEWAY_URL || 'https://api.yourapp.com' }}" \
            .
          docker push ${{ env.REGISTRY }}/maturoscope-app/app:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/maturoscope-app/app:latest

  build-dashboard:
    needs: check-changes
    if: needs.check-changes.outputs.dashboard-changed == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to OVH Harbor
        run: echo "${{ secrets.HARBOR_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.HARBOR_USERNAME }} --password-stdin

      - name: Build & Push Dashboard Image
        run: |
          docker build \
            --file apps/dashboard/Dockerfile \
            --tag ${{ env.REGISTRY }}/maturoscope-dashboard/dashboard:${{ github.sha }} \
            --tag ${{ env.REGISTRY }}/maturoscope-dashboard/dashboard:latest \
            --build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY="${{ secrets.PROD_GOOGLE_MAPS_API_KEY || 'prod-key' }}" \
            --build-arg NEXT_PUBLIC_GATEWAY_URL="${{ secrets.PROD_GATEWAY_URL || 'https://api.yourapp.com' }}" \
            .
          docker push ${{ env.REGISTRY }}/maturoscope-dashboard/dashboard:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/maturoscope-dashboard/dashboard:latest

  summary:
    needs: [check-changes, build-api, build-app, build-dashboard]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Build Summary
        run: |
          echo "🚀 Smart Build Summary"
          echo "======================"
          echo "API changed: ${{ needs.check-changes.outputs.api-changed }}"
          echo "App changed: ${{ needs.check-changes.outputs.app-changed }}"
          echo "Dashboard changed: ${{ needs.check-changes.outputs.dashboard-changed }}"
          echo ""
          echo "Build Results:"
          echo "API: ${{ needs.build-api.result || 'skipped' }}"
          echo "App: ${{ needs.build-app.result || 'skipped' }}"
          echo "Dashboard: ${{ needs.build-dashboard.result || 'skipped' }}"
          echo ""
          echo "✅ Smart build completed!"

name: CI - Docker Test Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test-build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Build API Image (Test)
      - name: Build API Image - Test
        run: |
          docker build \
            --file apps/api/Dockerfile \
            --tag test-api:latest \
            --build-arg DATABASE_URL="postgresql://test:test@localhost:5432/test" \
            --build-arg JWT_SECRET="test-secret" \
            --build-arg API_PORT=8000 \
            .

      # 4. Build App Image (Test)
      - name: Build App Image - Test
        run: |
          docker build \
            --file apps/app/Dockerfile \
            --tag test-app:latest \
            --build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY="test-key" \
            --build-arg NEXT_PUBLIC_GATEWAY_URL="http://localhost:8000" \
            .

      # 5. Build Dashboard Image (Test)
      - name: Build Dashboard Image - Test
        run: |
          docker build \
            --file apps/dashboard/Dockerfile \
            --tag test-dashboard:latest \
            --build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY="test-key" \
            --build-arg NEXT_PUBLIC_GATEWAY_URL="http://localhost:8000" \
            .

      # 6. Test images locally
      - name: Test API Image
        run: |
          docker run --rm -d --name test-api test-api:latest
          sleep 10
          curl -f http://localhost:8000 || echo "API test failed"
          docker stop test-api

      # 7. Success message
      - name: Test build success
        run: |
          echo "✅ All Docker images built and tested successfully!"
          echo "📦 Images created:"
          echo "  - API: test-api:latest"
          echo "  - App: test-app:latest"
          echo "  - Dashboard: test-dashboard:latest"
          echo "🧪 All images passed basic functionality tests"
